apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-pro-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: platform-pro.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-pro-service
            port:
              number: 80
